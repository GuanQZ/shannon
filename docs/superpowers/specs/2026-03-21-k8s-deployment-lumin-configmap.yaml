apiVersion: v1
kind: ConfigMap
metadata:
  name: lumin-config
data:
  lumin.yaml: |
    # Internal Agent 配置
    internalAgent:
      # Internal Agent 服务地址（集群内 Service 名称）
      baseUrl: "http://internal-agent-service:8080"

      # 会话初始化参数
      initSession:
        appId: "lumin-app"
        agentId: "security-agent"
        trCode: "security-scan"
        trVersion: "1.0"

      # 聊天请求参数
      chat:
        appId: "lumin-app"
        trCode: "security-chat"
        trVersion: "1.0"
        stream: true

      # SSE 请求超时时间（毫秒）
      timeout: 1200000

    # 日志配置
    logging:
      level: info
