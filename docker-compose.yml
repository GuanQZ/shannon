services:
  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--db-filename", "/home/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"   # gRPC
      - "8233:8233"   # Web UI (built-in)
    volumes:
      - temporal-data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    image: lumin-worker:latest
    entrypoint: >
      sh -c "PORT=8082 node lumin-tool-mcp/dist/http-server.js &
             playwright-mcp --port 8083 --host 0.0.0.0 --allowed-hosts '*' --headless --executable-path /usr/bin/chromium-browser --no-sandbox &
             node dist/temporal/worker.js"
    env_file:
      - .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - ROUTER_DEFAULT=${ROUTER_DEFAULT:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - INTERNAL_AGENT_BASE_URL=${INTERNAL_AGENT_BASE_URL:-}
      - INTERNAL_AGENT_INIT_SESSION_APP_ID=${INTERNAL_AGENT_INIT_SESSION_APP_ID:-}
      - INTERNAL_AGENT_INIT_SESSION_TR_CODE=${INTERNAL_AGENT_INIT_SESSION_TR_CODE:-}
      - INTERNAL_AGENT_INIT_SESSION_TR_VERSION=${INTERNAL_AGENT_INIT_SESSION_TR_VERSION:-}
      - INTERNAL_AGENT_INIT_SESSION_AGENT_ID=${INTERNAL_AGENT_INIT_SESSION_AGENT_ID:-}
      - INTERNAL_AGENT_CHAT_APP_ID=${INTERNAL_AGENT_CHAT_APP_ID:-}
      - INTERNAL_AGENT_CHAT_TR_CODE=${INTERNAL_AGENT_CHAT_TR_CODE:-}
      - INTERNAL_AGENT_CHAT_TR_VERSION=${INTERNAL_AGENT_CHAT_TR_VERSION:-}
      - INTERNAL_AGENT_CHAT_STREAM=${INTERNAL_AGENT_CHAT_STREAM:-}
      - NODE_ENV=production
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0
    ports:
      - "8082:8082"   # lumin-tool-mcp (MCP server for tools)
      - "8083:8083"   # playwright-mcp (browser automation)
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
      - ./lumin-tool-mcp/src:/app/lumin-tool-mcp/src
      - ./lumin-tool-mcp/dist:/app/lumin-tool-mcp/dist
      - ./configs:/app/configs
      - ./prompts:/app/prompts
      - ./audit-logs:/app/audit-logs
      - ${OUTPUT_DIR:-./audit-logs}:/app/output
      - ./repos:/app/repos
      - ${BENCHMARKS_BASE:-.}:/benchmarks
      - lumin-deliverables:/app/deliverables
    shm_size: 2gb
    ipc: host
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8082/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional: claude-code-router for multi-model support
  # Start with: ROUTER=true ./lumin start ...
  router:
    image: node:20-slim
    profiles: ["router"]
    command: >
      sh -c "apt-get update && apt-get install -y gettext-base &&
             npm install -g @musistudio/claude-code-router &&
             mkdir -p /root/.claude-code-router &&
             envsubst < /config/router-config.json > /root/.claude-code-router/config.json &&
             ccr start"
    ports:
      - "3456:3456"
    volumes:
      - ./configs/router-config.json:/config/router-config.json:ro
    environment:
      - HOST=0.0.0.0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - ROUTER_DEFAULT=${ROUTER_DEFAULT:-openai,gpt-4o}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  temporal-data:
  lumin-deliverables:
