services:
  temporal:
    image: temporalio/temporal:latest
    command: ["server", "start-dev", "--db-filename", "/home/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"   # gRPC
      - "8233:8233"   # Web UI (built-in)
    volumes:
      - temporal-data:/home/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build: .
    entrypoint: ["node", "dist/temporal/worker.js"]
    env_file:
      - .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}  # Optional: route through claude-code-router
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}  # Auth token for router
      - ROUTER_DEFAULT=${ROUTER_DEFAULT:-}  # Model name when using router (e.g., "gemini,gemini-2.5-pro")
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - INTERNAL_AGENT_BASE_URL=${INTERNAL_AGENT_BASE_URL:-}
      - INTERNAL_AGENT_INIT_SESSION_APP_ID=${INTERNAL_AGENT_INIT_SESSION_APP_ID:-}
      - INTERNAL_AGENT_INIT_SESSION_TR_CODE=${INTERNAL_AGENT_INIT_SESSION_TR_CODE:-}
      - INTERNAL_AGENT_INIT_SESSION_TR_VERSION=${INTERNAL_AGENT_INIT_SESSION_TR_VERSION:-}
      - INTERNAL_AGENT_INIT_SESSION_AGENT_ID=${INTERNAL_AGENT_INIT_SESSION_AGENT_ID:-}
      - INTERNAL_AGENT_CHAT_APP_ID=${INTERNAL_AGENT_CHAT_APP_ID:-}
      - INTERNAL_AGENT_CHAT_TR_CODE=${INTERNAL_AGENT_CHAT_TR_CODE:-}
      - INTERNAL_AGENT_CHAT_TR_VERSION=${INTERNAL_AGENT_CHAT_TR_VERSION:-}
      - INTERNAL_AGENT_CHAT_STREAM=${INTERNAL_AGENT_CHAT_STREAM:-}
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
      - ./mcp-server/src:/app/mcp-server/src
      - ./mcp-server/dist:/app/mcp-server/dist
      - ./configs:/app/configs
      - ./prompts:/app/prompts
      - ./audit-logs:/app/audit-logs
      - ${OUTPUT_DIR:-./audit-logs}:/app/output
      - ./repos:/repos
      - ${BENCHMARKS_BASE:-.}:/benchmarks
    shm_size: 2gb
    ipc: host
    security_opt:
      - seccomp:unconfined

  # Optional: claude-code-router for multi-model support
  # Start with: ROUTER=true ./lumin start ...
  router:
    image: node:20-slim
    profiles: ["router"]  # Only starts when explicitly requested
    command: >
      sh -c "apt-get update && apt-get install -y gettext-base &&
             npm install -g @musistudio/claude-code-router &&
             mkdir -p /root/.claude-code-router &&
             envsubst < /config/router-config.json > /root/.claude-code-router/config.json &&
             ccr start"
    ports:
      - "3456:3456"
    volumes:
      - ./configs/router-config.json:/config/router-config.json:ro
    environment:
      - HOST=0.0.0.0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - ROUTER_DEFAULT=${ROUTER_DEFAULT:-openai,gpt-4o}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Lumin-target vulnerable application
  lumin-target:
    build: ./repos/lumin-target
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Mock Internal Agent Server (independent project at ~/.claude/projects/mock-server)
  mock-server:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install --include=dev && npx tsc && node dist/index.js"
    ports:
      - "3000:3000"
    volumes:
      - ~/.claude/projects/mock-server:/app
    env_file:
      - ~/.claude/projects/mock-server/.env
    depends_on:
      mcp-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MCP Server for tools - use worker image which has mcp-server deps
  mcp-server:
    image: lumin-worker:latest
    working_dir: /app/mcp-server
    entrypoint: ["node", "dist/http-server.js"]
    ports:
      - "8082:8082"
    volumes:
      - ./mcp-server/dist:/app/mcp-server/dist
      - lumin-deliverables:/app/deliverables
    environment:
      - PORT=8082
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8082/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Playwright MCP Server for browser automation
  playwright-mcp:
    image: lumin-worker:latest
    working_dir: /app
    entrypoint: ["playwright-mcp", "--port", "8083", "--host", "0.0.0.0", "--allowed-hosts", "*", "--headless", "--executable-path", "/usr/bin/chromium-browser", "--no-sandbox"]
    ports:
      - "8083:8083"
    volumes:
      - lumin-deliverables:/app/deliverables
      - ./repos:/app/repos
    environment:
      - NODE_ENV=production
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0

volumes:
  temporal-data:
  lumin-deliverables:
