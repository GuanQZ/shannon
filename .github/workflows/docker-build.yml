name: Build Docker Image

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: guanqz/lumin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.run_number }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          file: ./Dockerfile

      - name: Download image to tar
        if: github.event_name != 'pull_request'
        run: |
          # Save image as tar file for offline use
          # Use IMAGE_NAME env variable (already lowercase)
          IMAGE_NAME=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
          docker save -o lumin-amd64.tar $IMAGE_NAME

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: lumin-amd64.tar
          retention-days: 7

      - name: Print download instructions
        if: github.event_name != 'pull_request'
        run: |
          echo "## Build Complete"
          echo ""
          echo "Download the image from the Artifacts section above."
          echo ""
          echo "To load the image on your machine:"
          echo "```bash"
          echo "docker load -i lumin-amd64.tar"
          echo "```"
          echo ""
          echo "To tag for your internal registry:"
          echo "```bash"
          docker load -i lumin-amd64.tar
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} your-internal-registry/lumin:latest
          echo "```"
