name: Build Docker Image

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/guanqz/lumin:1.0.0
          platforms: linux/amd64
          file: ./Dockerfile

      - name: Print image info
        run: |
          echo "## Build Complete"
          echo ""
          echo "Image: ghcr.io/guanqz/lumin:latest"
          echo ""
          echo "To pull and tag for your internal registry:"
          echo "```bash"
          echo "docker pull ghcr.io/guanqz/lumin:latest"
          echo "docker tag ghcr.io/guanqz/lumin:latest your-internal-registry/lumin:latest"
          echo "docker push your-internal-registry/lumin:latest"
          echo "```"
