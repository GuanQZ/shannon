name: Build Docker Image

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: lumin-local:latest
          platforms: linux/amd64
          file: ./Dockerfile

      - name: Save image to tar
        run: |
          docker save -o lumin-amd64.tar lumin-local:latest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: lumin-amd64.tar
          retention-days: 7

      - name: Print download instructions
        run: |
          echo "## Build Complete"
          echo ""
          echo "Download the image from the Artifacts section above."
          echo ""
          echo "To load the image on your machine:"
          echo "```bash"
          echo "docker load -i lumin-amd64.tar"
          echo "```"
          echo ""
          echo "To tag for your internal registry:"
          echo "```bash"
          docker load -i lumin-amd64.tar
          docker tag lumin-local:latest your-internal-registry/lumin:latest
          echo "```"
