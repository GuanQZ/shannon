name: Build Docker Image

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/guanqz/lumin:1.0.0
            ghcr.io/guanqz/lumin:latest
            ghcr.io/guanqz/lumin:1.0.0-amd64
            ghcr.io/guanqz/lumin:1.0.0-arm64
            ghcr.io/guanqz/lumin:amd64
            ghcr.io/guanqz/lumin:arm64
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile

      - name: Verify start.sh content (amd64)
        run: |
          # Pull and verify the amd64 version
          docker pull ghcr.io/guanqz/lumin:amd64
          START_CONTENT=$(docker run --rm ghcr.io/guanqz/lumin:amd64 cat /app/start.sh | head -3)
          echo "First 3 lines of start.sh (amd64):"
          echo "$START_CONTENT"
          if echo "$START_CONTENT" | grep -q '\\\\n'; then
            echo "ERROR: start.sh contains literal \\n instead of newlines!"
            exit 1
          fi
          echo "✓ start.sh looks correct"

      - name: Export image to tar (amd64)
        run: |
          docker save ghcr.io/guanqz/lumin:amd64 -o /tmp/lumin-amd64.tar
          ls -lh /tmp/lumin-amd64.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumin-image-amd64
          path: /tmp/lumin-amd64.tar
          retention-days: 7

      - name: Print image info
        run: |
          echo "## Build Complete"
          echo ""
          echo "Image: ghcr.io/guanqz/lumin:1.0.0"
          echo ""
          echo "To pull and use:"
          echo "```bash"
          echo "docker pull ghcr.io/guanqz/lumin:1.0.0"
          echo "docker tag ghcr.io/guanqz/lumin:1.0.0 your-registry/lumin:1.0.0"
          echo "docker push your-registry/lumin:1.0.0"
          echo "```"
