name: Build Docker Image

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/guanqz/lumin:1.0.0
            ghcr.io/guanqz/lumin:latest
            ghcr.io/guanqz/lumin:1.0.0-amd64
            ghcr.io/guanqz/lumin:1.0.0-arm64
            ghcr.io/guanqz/lumin:amd64
            ghcr.io/guanqz/lumin:arm64
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile

      - name: Verify start.sh content (amd64)
        run: |
          # 等待镜像完全推送后再验证
          sleep 5
          docker pull ghcr.io/guanqz/lumin:amd64
          START_CONTENT=$(docker run --rm ghcr.io/guanqz/lumin:amd64 cat /app/start.sh | head -3)
          echo "First 3 lines of start.sh (amd64):"
          echo "$START_CONTENT"
          if echo "$START_CONTENT" | grep -q '\\\\n'; then
            echo "ERROR: start.sh contains literal \\n instead of newlines!"
            exit 1
          fi
          echo "✓ start.sh looks correct"

  export-amd64:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and export amd64 image
        run: |
          # 等待确保镜像完全可用
          sleep 10
          docker pull --platform linux/amd64 ghcr.io/guanqz/lumin:amd64
          docker save ghcr.io/guanqz/lumin:amd64 -o /tmp/lumin-amd64.tar
          ls -lh /tmp/lumin-amd64.tar

      - name: Upload artifact (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: lumin-image-amd64
          path: /tmp/lumin-amd64.tar
          retention-days: 7

  export-arm64:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and export arm64 image
        run: |
          # 等待确保镜像完全可用
          sleep 10
          docker pull --platform linux/arm64 ghcr.io/guanqz/lumin:arm64
          docker save ghcr.io/guanqz/lumin:arm64 -o /tmp/lumin-arm64.tar
          ls -lh /tmp/lumin-arm64.tar

      - name: Upload artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: lumin-image-arm64
          path: /tmp/lumin-arm64.tar
          retention-days: 7

  print-info:
    runs-on: ubuntu-latest
    needs: [build-and-push, export-amd64, export-arm64]

    steps:
      - name: Print build summary
        run: |
          echo "## Build Complete"
          echo ""
          echo "Images: ghcr.io/guanqz/lumin:amd64, ghcr.io/guanqz/lumin:arm64"
          echo "Artifacts: lumin-image-amd64, lumin-image-arm64"
          echo ""
          echo "To pull and use:"
          echo "```bash"
          echo "docker pull ghcr.io/guanqz/lumin:amd64"
          echo "docker pull ghcr.io/guanqz/lumin:arm64"
          echo "```"
