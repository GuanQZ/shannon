name: Build Docker Image

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ghcr.io/guanqz/lumin:1.0.0,ghcr.io/guanqz/lumin:latest
          platforms: linux/amd64
          file: ./Dockerfile

      - name: Export image to tar
        run: |
          docker save ghcr.io/guanqz/lumin:1.0.0 -o /tmp/lumin.tar
          ls -lh /tmp/lumin.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumin-image
          path: /tmp/lumin.tar
          retention-days: 7

      - name: Push to GitHub Container Registry
        run: |
          docker push ghcr.io/guanqz/lumin:1.0.0
          docker push ghcr.io/guanqz/lumin:latest

      - name: Print image info
        run: |
          echo "## Build Complete"
          echo ""
          echo "Image: ghcr.io/guanqz/lumin:1.0.0"
          echo ""
          echo "To pull and use:"
          echo "```bash"
          echo "docker pull ghcr.io/guanqz/lumin:1.0.0"
          echo "docker tag ghcr.io/guanqz/lumin:1.0.0 your-registry/lumin:1.0.0"
          echo "docker push your-registry/lumin:1.0.0"
          echo "```"
