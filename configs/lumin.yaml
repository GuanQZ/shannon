# Lumin Runtime Configuration
# 全局运行时配置，适用于 K8s 部署通过 ConfigMap 挂载
# 此配置文件不应包含任何目标特定的配置（目标配置在 configs/*.yaml 中）

# Internal Agent 配置
internalAgent:
  # Internal Agent 服务地址
  baseUrl: "http://mock-server:3000"

  # 会话初始化参数
  initSession:
    appId: "lumin-app"
    agentId: "security-agent"
    trCode: "security-scan"
    trVersion: "1.0"

  # chat请求参数
  chat:
    appId: "lumin-app"
    trCode: "security-chat"
    trVersion: "1.0"
    stream: true

  # SSE 请求超时时间（毫秒）
  timeout: 1200000

# Temporal 配置
temporal:
  # Temporal 服务地址
  # 单容器模式: localhost:7233
  # 多容器模式/外部: temporal:7233 或其他服务地址
  address: "localhost:7233"

# MCP Server 配置
mcp:
  # MCP Server 服务地址
  # 单容器模式: http://localhost:8082
  # 多容器模式/外部: http://mcp:8082 或其他服务地址
  url: "http://localhost:8082"

# 日志配置
logging:
  level: info
